# Netlify configuration for The Garage.
#
# Deploys the Vite-built front-end in /dist as a static site, plus serverless
# Functions for the backend API. Client-side routes (/nieuws, /nieuws/:slug,
# /beheer) are handled by the SPA fallback at the bottom.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  # Functions are PRE-BUNDLED to self-contained ESM by `npm run build:functions`
  # (esbuild). We do NOT let Netlify's default bundler (nft) re-transpile our TS:
  # nft mis-bundled the cms function (lost the default export -> "D.handler is not
  # a function" 502s). Netlify just ships the generated netlify/functions/*.mjs.
  # included_files supplies the content the function reads at runtime.
  included_files = ["content/**", "src/config/**", "src/data.ts"]

# --- API routes → serverless functions (must come BEFORE the SPA fallback) ---

# AI-CMS backend (analyze / plan / preview / approve / deploy / cancel).
# Splat-less on purpose: Netlify proxy-rewrites resolve the function root but
# NOT a function subpath, while preserving the original request path — the
# function reads the action from that path.
[[redirects]]
  from = "/api/cms/*"
  to = "/.netlify/functions/cms"
  status = 200

# On-site Gemini advisor.
[[redirects]]
  from = "/api/advisor"
  to = "/.netlify/functions/advisor"
  status = 200

# --- SPA fallback: every other path serves index.html for the React router ---
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
